language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!src-i386/**"
    - "!src-x64/**"
    - "!man/**"
    - "!**/*.dll"

  path_instructions:
    - path: "src/**/*.cpp"
      instructions: |
        This is an R package using Rcpp. Review C++ code for correctness of
        mathematical formulas, especially the logistic protection curve
        (Coudeville et al. 2010): susceptibility uses alpha=2.844 and beta=1.299
        with the form exp(beta*(log(T) - alpha)). Flag any use of log(2.844)
        in place of 2.844 as a bug.
    - path: "R/**/*.R"
      instructions: |
        This is an R package. Check for tidyverse/dplyr usage consistency,
        correct use of NSE (non-standard evaluation), and that exported
        functions have roxygen2 documentation.
    - path: "vignettes/**/*.Rmd"
      instructions: |
        Vignettes should be self-contained and reproducible. Check that all
        referenced functions are exported from the package and that code
        chunks use appropriate eval/echo options.

chat:
  auto_reply: true
